name: Publish Corpus

on:
  push:
    branches: [main]
    paths: ['corpus/**']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for corpus files
        id: check
        run: |
          COUNT=$(find corpus -name '*.log.gz' -type f | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::notice::No corpus files found — skipping release."
          else
            echo "Found $COUNT corpus files"
          fi

      - name: Build tarball
        if: steps.check.outputs.count != '0'
        run: |
          tar czf /tmp/manasight-corpus.tar.gz corpus/*.log.gz
          echo "Tarball contains ${{ steps.check.outputs.count }} log files"
          ls -lh /tmp/manasight-corpus.tar.gz

      - name: Determine next version
        if: steps.check.outputs.count != '0'
        id: version
        run: |
          LATEST=$(git tag -l 'manasight-corpus-v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="manasight-corpus-v1"
          else
            NUM=${LATEST#manasight-corpus-v}
            NEXT="manasight-corpus-v$((NUM + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Create release
        if: steps.check.outputs.count != '0'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            /tmp/manasight-corpus.tar.gz \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Corpus release with ${{ steps.check.outputs.count }} sanitized log files."
        env:
          GH_TOKEN: ${{ github.token }}

      # Trigger manasight-parser smoke tests against the new corpus release.
      # Requires PARSER_DISPATCH_TOKEN: a PAT with write access to
      # manasight/manasight-parser (contents: write).
      - name: Trigger parser smoke tests
        if: steps.check.outputs.count != '0'
        run: |
          gh api repos/manasight/manasight-parser/dispatches \
            -f event_type=corpus-release \
            -f "client_payload[tag]=${{ steps.version.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.PARSER_DISPATCH_TOKEN }}
